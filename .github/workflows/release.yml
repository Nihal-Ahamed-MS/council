name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Verify build output
        run: test -f dist/council.js

      - name: Generate checksum
        run: shasum -a 256 dist/council.js > dist/council.js.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: council-dist
          path: |
            dist/council.js
            dist/council.js.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-formula:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download checksum
        run: |
          VERSION=${GITHUB_REF_NAME}
          BASE="https://github.com/Nihal-Ahamed-MS/council/releases/download/${VERSION}"
          SHA=$(curl -sL "${BASE}/council.js.sha256" | awk '{print $1}')
          echo "SHA=${SHA}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Update Homebrew formula
        run: |
          sed -i \
            -e "s|version \".*\"|version \"${VERSION#v}\"|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA}\"|" \
            -e "s|/download/v[^/]*/|/download/${VERSION}/|g" \
            formula/council.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add formula/council.rb
          git commit -m "chore: update formula to ${VERSION}"
          git pull --rebase origin main
          git push origin HEAD:main
